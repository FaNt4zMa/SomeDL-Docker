name: Build and Push SomeDL Image

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Get latest SomeDL version from PyPI
        id: pypi
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/SomeDL/json | jq -r '.info.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Downcase registry owner
        id: registry_owner
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check if image tag already exists on GHCR
        id: check_tag
        run: |
          OWNER="${{ steps.registry_owner.outputs.owner }}"
          TAG="${{ steps.pypi.outputs.version }}"
          
          # Inspect remote image tags without pulling layers.
          # Exits with 0 if tag exists, non-zero if it does not.
          if docker buildx imagetools inspect ghcr.io/$OWNER/somedl:$TAG >/dev/null 2>&1; then
            echo "Tag $TAG already exists on GHCR. Skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Tag $TAG not found on GHCR. Building..."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - uses: docker/build-push-action@v7
        if: steps.check_tag.outputs.skip == 'false'
        with:
          context: .
          push: true
          build-args: |
            SOMEDL_VERSION=${{ steps.pypi.outputs.version }}
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.owner }}/somedl:latest
            ghcr.io/${{ steps.registry_owner.outputs.owner }}/somedl:${{ steps.pypi.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.pypi.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-3.0-only