name: Build and Push SomeDL Image

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Get latest SomeDL version from PyPI
        id: pypi
        run: |
          VERSION=$(curl -s https://pypi.org/pypi/SomeDL/json | jq -r '.info.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get currently published image version from file
        id: current
        run: |
          # Read the version from tracked file; fallback to "none" if file doesn't exist
          if [ -f .published-version ]; then
            CURRENT=$(cat .published-version | tr -d '[:space:]')
          else
            CURRENT="none"
          fi
          echo "version=$CURRENT" >> $GITHUB_OUTPUT

      - name: Decide whether a build is needed
        id: need_build
        run: |
          if [ "${{ steps.pypi.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "Already on ${{ steps.pypi.outputs.version }}, skipping build."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "New version ${{ steps.pypi.outputs.version }} detected (current: ${{ steps.current.outputs.version }})."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Downcase registry owner
        id: registry_owner
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner=$OWNER" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        if: steps.need_build.outputs.skip == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4
        if: steps.need_build.outputs.skip == 'false'

      - uses: docker/build-push-action@v7
        if: steps.need_build.outputs.skip == 'false'
        with:
          context: .
          push: true
          build-args: |
            SOMEDL_VERSION=${{ steps.pypi.outputs.version }}
          tags: |
            ghcr.io/${{ steps.registry_owner.outputs.owner }}/somedl:latest
            ghcr.io/${{ steps.registry_owner.outputs.owner }}/somedl:${{ steps.pypi.outputs.version }}
          labels: |
            org.opencontainers.image.version=${{ steps.pypi.outputs.version }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=GPL-3.0-only

      - name: Update published version file
        if: steps.need_build.outputs.skip == 'false'
        run: |
          echo "${{ steps.pypi.outputs.version }}" > .published-version
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .published-version
          git commit -m "chore: update published version to ${{ steps.pypi.outputs.version }} [skip ci]"
          git push